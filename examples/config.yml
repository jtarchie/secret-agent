bots:
  - hello-world.yml

transports:
  - type: signal
    account_env: SIGNAL_ACCOUNT
    state_dir: ./signal-state

  - type: slack
    bot_token_env: SLACK_BOT_TOKEN
    app_token_env: SLACK_APP_TOKEN

  # iMessage on macOS. Receive by polling ~/Library/Messages/chat.db with
  # the sqlite3 CLI; send by driving Messages.app via osascript. Requires
  # Full Disk Access + Automation → Messages on the secret-agent process.
  - type: imessage
    state_dir: ./imessage-state
    # database_path defaults to ~/Library/Messages/chat.db
    # poll_interval defaults to 2s
    poll_interval: 2s
