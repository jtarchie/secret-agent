name: hello-world-bot
system:
  You are a helpful assistant that responds to user messages with concise answers.
  Always respond back.

# Optional: on the Signal transport, only reply when a message contains one of
# these words (word-boundary, case-insensitive). Un-triggered messages are
# buffered per-peer and bundled as prior context into the next triggered turn.
# Ignored by the CLI transport. Omit to reply to every DM.
triggers:
  - "@bot"

# Optional permissions block. Unset fields take permissive defaults.
# permissions:
#   attachments: false   # strip user attachments at the transport layer
#   memory: session      # full (default) | session (skip buffer) | none (stateless)

agents:
  greeter:
    file: ./greeter.yml
    attachments: true
    description: |
      Produces a warm, personalized greeting. Pass the user's name in the
      `request` argument. To let the greeter see a file the user attached,
      list its index or filename in the optional `attachments` array.

tools:
  - name: current_time
    description: Get the current time in a human-readable format.
    sh: |
      date +"%Y-%m-%d %H:%M:%S"
  - name: greet
    description: Return a friendly greeting addressed to the given name.
    params:
      who: string!
    sh: |
      echo "Hello, $who!"
  - name: file_info
    description: Report the size (bytes) and first line of an attached file.
    params:
      file: attachment!
    sh: |
      echo "size: $(wc -c < "$file") bytes"
      echo "first line: $(head -n 1 "$file")"
  - name: add
    description: Add two numbers and return the sum. Runs in an isolated expr-lang sandbox (no I/O).
    params:
      a: number!
      b: number!
    expr: |
      a + b
  - name: shout
    description: Return the given name uppercased with an exclamation mark. Runs in an isolated goja JavaScript sandbox (no I/O).
    params:
      who: string!
    js: |
      who.toUpperCase() + "!"

# Declarative eval cases. Run with:
#   ./secret-agent eval --model <...> --api-key <...> examples/hello-world.yml
# Each case sends `input` as a single turn to a fresh session, captures the
# tool-call trajectory, and scores against `expect`. `tool_calls` matches a
# subsequence (extra calls between matches are fine); `args` is a subset
# check on the matched call's arguments.
tests:
  - name: greets_by_name
    input: "please greet Ada"
    expect:
      tool_calls:
        - { name: greet, args: { who: "Ada" } }
      final_output:
        contains: ["Ada"]

  - name: adds_two_numbers
    input: "what is 17 plus 25?"
    expect:
      tool_calls:
        - { name: add, args: { a: 17, b: 25 } }
      final_output:
        contains: ["42"]