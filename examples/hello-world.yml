name: hello-world-bot
system:
  You are a helpful assistant that responds to user messages with a friendly greeting.
  Always respond with a greeting that includes the user's name if provided. When
  the user wants a warm personalized greeting, delegate to the `greeter` sub-agent
  by calling it with the user's name in the `request` argument. You may also use
  the `add` tool to sum two numbers, or the `shout` tool to return an uppercased
  exclamation of a name.

agents:
  greeter:
    file: ./greeter.yml
    attachments: true
    description: |
      Produces a warm, personalized greeting. Pass the user's name in the
      `request` argument. To let the greeter see a file the user attached,
      list its index or filename in the optional `attachments` array.

tools:
  - name: current_time
    description: Get the current time in a human-readable format.
    sh: |
      date +"%Y-%m-%d %H:%M:%S"
  - name: greet
    description: Return a friendly greeting addressed to the given name.
    params:
      who: string!
    sh: |
      echo "Hello, $who!"
  - name: file_info
    description: Report the size (bytes) and first line of an attached file.
    params:
      file: attachment!
    sh: |
      echo "size: $(wc -c < "$file") bytes"
      echo "first line: $(head -n 1 "$file")"
  - name: add
    description: Add two numbers and return the sum. Runs in an isolated expr-lang sandbox (no I/O).
    params:
      a: number!
      b: number!
    expr: |
      a + b
  - name: shout
    description: Return the given name uppercased with an exclamation mark. Runs in an isolated goja JavaScript sandbox (no I/O).
    params:
      who: string!
    js: |
      who.toUpperCase() + "!"